name: Build SABnzbd Image

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build
        run: nix build -L

      - name: Flake check
        run: nix flake check -L

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load Image into Docker
        if: github.event_name != 'pull_request'
        run: |
          docker load < result

      - name: Tag and Push Image
        if: github.event_name != 'pull_request'
        run: |
          # Convert repository owner to lowercase for registry compliance
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          # Match the local name defined in your flake.nix
          LOCAL_IMAGE="minimalbase-ng:latest"
          TARGET_IMAGE="ghcr.io/${{ github.repository }}"
          
          docker tag "$LOCAL_IMAGE" "${TARGET_IMAGE}:latest"
          docker tag "$LOCAL_IMAGE" "${TARGET_IMAGE}:${{ github.sha }}"
          
          docker push "${TARGET_IMAGE}:latest"
          docker push "${TARGET_IMAGE}:${{ github.sha }}"        
