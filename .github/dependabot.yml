version: 2

updates:
  # Nix flake inputs (nixpkgs, minimalbase, etc.)
  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5

  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
